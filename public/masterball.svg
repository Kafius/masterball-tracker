<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="t"><rect x="0" y="0" width="100" height="50"/></clipPath>
    <clipPath id="b"><rect x="0" y="50" width="100" height="50"/></clipPath>
  </defs>

  <!-- White outer ring (sticker/badge style) -->
  <circle cx="50" cy="50" r="48" fill="white"/>

  <!-- Bottom half — pale lavender-white -->
  <circle cx="50" cy="50" r="44" fill="#eeeaf8" clip-path="url(#b)"/>

  <!-- Top half — Master Ball purple -->
  <circle cx="50" cy="50" r="44" fill="#7B35A8" clip-path="url(#t)"/>

  <!-- Left pink ear -->
  <ellipse cx="26" cy="30" rx="9.5" ry="15" fill="#E8729A" transform="rotate(-28 26 30)" clip-path="url(#t)"/>

  <!-- Right pink ear -->
  <ellipse cx="74" cy="30" rx="9.5" ry="15" fill="#E8729A" transform="rotate(28 74 30)" clip-path="url(#t)"/>

  <!-- White M-emblem circle -->
  <circle cx="50" cy="36" r="17" fill="white"/>

  <!-- M glyph -->
  <text x="50" y="44.5" text-anchor="middle" font-size="20" font-weight="900"
        font-family="'Arial Black', 'Arial', sans-serif" fill="#2B1060">M</text>

  <!-- Center dividing band -->
  <rect x="6" y="46" width="88" height="8" fill="#18102C" rx="1"/>

  <!-- Button ring -->
  <circle cx="50" cy="50" r="9.5" fill="white" stroke="#18102C" stroke-width="2"/>
  <!-- Button core -->
  <circle cx="50" cy="50" r="5.5" fill="#18102C"/>
  <!-- Button glint -->
  <circle cx="50" cy="50" r="2.5" fill="white" opacity="0.35"/>

  <!-- Bottom stripe lines -->
  <line x1="9"  y1="63" x2="91" y2="63" stroke="#c5bae8" stroke-width="1.5"/>
  <line x1="11" y1="74" x2="89" y2="74" stroke="#c5bae8" stroke-width="1.5"/>

  <!-- Dark outer border -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#18102C" stroke-width="3.5"/>
</svg>
